<!DOCTYPE html>
<html lang= "vi">
<head>
    <title>Hóa đơn thanh toán</title>
    <meta charset= "utf-8">
    <link rel= "stylesheet" href= "../css/style4.css">
</head> 
<body>
    <h2>HÓA ĐƠN THANH TOÁN</h2>
    <table border="1">
       <tr>
        <th>STT</th>
        <th>Tên sản phẩm</th>
        <th>Số lượng</th>
        <th>Đơn giá</th>
        <th>Thành tiền</th>
       </tr>
       <tr>
         <td>1</td>
         <td>A</td>
         <td class="sl">3</td>
         <td class="dg">1000</td>
         <td class="tt"></td>
       </tr> 
       <tr>
         <td>2</td>
         <td>B</td>
         <td class="sl">2</td>
         <td class="dg">2000</td>
         <td class="tt"></td>
       </tr>
       <tr>
         <td>3</td>
         <td>C</td>
         <td class="sl">4</td>
         <td class="dg">3000</td>
         <td class="tt"></td>
       </tr>
       <tr>
         <td colspan="4">Tổng thanh toán:</td>
         <td id="Tongthanhtoan"></td>
       </tr>
    </table>
    <script>
        const Dongia= document.querySelectorAll(".dg");
        const Soluong= document.querySelectorAll(".sl");
        const Thanhtien= document.querySelectorAll(".tt");
        let Tongthanhtoan=0;
        for(let i=0;i<Dongia.length;i++)
            {
                Thanhtien[i].innerHTML=Dongia[i].innerHTML*Soluong[i].innerHTML;
                Tongthanhtoan += parseInt(Thanhtien[i].innerHTML)
            }
        document.getElementById("Tongthanhtoan").innerHTML= Tongthanhtoan;
    </script>
</body>   
</html>
