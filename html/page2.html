<!DOCTYPE html>
<html lang="vi">
<head>
	<title>Trang thông tin cá nhân</title>
	<meta charset="utf-8">
	<link rel= "stylesheet" href= "../css/style2.css">
</head>
<body>  
    <div class="container">
        <form id="frmLogin">
            <h2 class="title">Đăng nhập tài khoản</h2>
            <div class="form-group">
                <label for="txtusername">Tên đăng nhập:</label>
                <input class="form-control" type="text" id="txtusername" 
                       name="txtusername">
            </div>
            <div class="form-group">
                <label for="txtpassword">Mật khẩu:</label>
                <input class="form-control" type="password" id="txtusername" 
                       name="txtpassword" placeholder="Nhập đủ 8 kí tự">
            </div>
            <input class="button" type="submit" name="sbLogin" value="Đăng nhập">
            <input class="button" type="reset" name="rsCancel" value="Hủy bỏ">
        </form>
    </div>
</body>
</html>
